name: MangasmiOS
options:
  bundleIdPrefix: com.mangasm
  deploymentTarget:
    iOS: "17.0"
packages:
  MangasmApp:
    path: .
targets:
  Mangasm:
    type: application
    platform: iOS
    sources:
      - App/iOS
    dependencies:
      - package: MangasmApp
        product: MangasmApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.mangasm.app
        DEVELOPMENT_TEAM: 854XZ2543V
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Mangasm
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
  MangasmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/iOS/Unit
      - path: Mangasm.storekit
        buildPhase: resources
    dependencies:
      - target: Mangasm
      - package: MangasmApp
        product: MangasmApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
  MangasmUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/iOS/UI
    dependencies:
      - target: Mangasm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  Mangasm:
    build:
      targets:
        Mangasm: all
        MangasmTests: [test]
        MangasmUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Mangasm.storekit
    test:
      config: Debug
      # StoreKitFlowTests drives StoreKit via SKTestSession (programmatic), so no
      # scheme-level storeKitConfiguration here (the two conflict).
      targets:
        - MangasmTests
        - MangasmUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
