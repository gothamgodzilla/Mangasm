name: MangasmiOS
options:
  bundleIdPrefix: guru.ganesh.mangasm
  deploymentTarget:
    iOS: "17.0"
packages:
  MangasmApp:
    path: .
targets:
  Mangasm:
    type: application
    platform: iOS
    sources:
      - App/iOS
    dependencies:
      - package: MangasmApp
        product: MangasmApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: guru.ganesh.mangasm
        PRODUCT_NAME: Mangasm
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
schemes:
  Mangasm:
    build:
      targets:
        Mangasm: all
    run:
      config: Debug
      storeKitConfiguration: Mangasm.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
