name: MangasmiOS
options:
  bundleIdPrefix: com.mangasm
  deploymentTarget:
    iOS: "17.0"
packages:
  MangasmApp:
    path: .
configFiles:
  Debug: App/iOS/Secrets.xcconfig
  Release: App/iOS/Secrets.xcconfig
targets:
  Mangasm:
    type: application
    platform: iOS
    sources:
      - App/iOS
    dependencies:
      - package: MangasmApp
        product: MangasmApp
    entitlements:
      path: App/iOS/Mangasm.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: App/iOS/Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.mangasm.app
        DEVELOPMENT_TEAM: 854XZ2543V
        # Manual App Store signing for swagger (Distribution cert + profile via ASC API).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution: Mark Webster (854XZ2543V)"
        PROVISIONING_PROFILE_SPECIFIER: "Mangasm App Store 18"
        CODE_SIGN_ENTITLEMENTS: App/iOS/Mangasm.entitlements
        PRODUCT_NAME: Mangasm
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "22"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Mangasm
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_BackgroundColor: "#0A0612"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_SUPABASE_URL: $(SUPABASE_URL)
        INFOPLIST_KEY_SUPABASE_PUBLISHABLE_KEY: $(SUPABASE_PUBLISHABLE_KEY)
        SWIFT_VERSION: "6.0"
  MangasmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/iOS/Unit
      - path: Mangasm.storekit
        buildPhase: resources
    dependencies:
      - target: Mangasm
      - package: MangasmApp
        product: MangasmApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
  MangasmUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/iOS/UI
    dependencies:
      - target: Mangasm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  Mangasm:
    build:
      targets:
        Mangasm: all
        MangasmTests: [test]
        MangasmUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Mangasm.storekit
    test:
      config: Debug
      # StoreKitFlowTests drives StoreKit via SKTestSession (programmatic), so no
      # scheme-level storeKitConfiguration here (the two conflict).
      targets:
        - MangasmTests
        - MangasmUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
