# CodeQL advanced setup — languages must be listed under matrix.include
# (an empty include fails workflow validation: Unexpected value '').
#
# Supported language keywords: actions, c-cpp, csharp, go, java-kotlin,
# javascript-typescript, python, ruby, rust, swift
# Docs: https://docs.github.com/en/code-security/code-scanning

name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 2 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # iOS / Swift package sources
          - language: swift
            build-mode: none
          # web/ surface (legal, promo, etc.)
          - language: javascript-typescript
            build-mode: none
          # workflow YAML under .github/
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'Replace this step with real build commands when using build-mode: manual.'
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
